<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Message</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            background-attachment: fixed;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.15) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(120deg); }
            66% { transform: translateY(-10px) rotate(240deg); }
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 3rem 2.5rem 2rem;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            max-width: 400px;
            width: 90vw;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                box-shadow: 
                    0 25px 60px rgba(0, 0, 0, 0.5),
                    0 0 0 1px rgba(255, 255, 255, 0.05),
                    inset 0 1px 0 rgba(255, 255, 255, 0.08);
            }
            50% { 
                box-shadow: 
                    0 35px 80px rgba(0, 0, 0, 0.7),
                    0 0 30px rgba(255, 255, 255, 0.1),
                    inset 0 1px 0 rgba(255, 255, 255, 0.12);
            }
        }

        .title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e0e0ff, #c0c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.85);
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.5;
            margin-bottom: 2.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .main-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .play-btn {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.25), rgba(102, 187, 106, 0.2));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 1.3rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.7rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            min-width: 160px;
            box-shadow: 0 10px 40px rgba(76, 175, 80, 0.25);
        }

        .play-btn:hover {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.4), rgba(102, 187, 106, 0.35));
            transform: translateY(-4px) scale(1.05);
            box-shadow: 
                0 20px 50px rgba(76, 175, 80, 0.35),
                0 0 30px rgba(76, 175, 80, 0.4);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .play-btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        .skip-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        .skip-btn {
            background: rgba(255, 193, 7, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 0.9rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            min-width: 80px;
        }

        .skip-btn:hover {
            background: rgba(255, 193, 7, 0.35);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 15px 40px rgba(255, 193, 7, 0.3),
                0 0 25px rgba(255, 193, 7, 0.35);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .skip-btn:active {
            transform: translateY(-1px) scale(1.02);
        }

        .time-display {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 1.5rem;
            min-height: 1.2em;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.8);
        }

        @media (max-width: 480px) {
            .title {
                font-size: 2rem;
            }
            
            .subtitle {
                font-size: 1rem;
                margin-bottom: 2rem;
            }
            
            .card {
                padding: 2.5rem 2rem 1.5rem;
                margin: 1rem;
            }
            
            .play-btn {
                padding: 1.1rem 1.6rem;
                font-size: 1rem;
                min-width: 140px;
            }
            
            .skip-controls {
                gap: 1.5rem;
            }
            
            .skip-btn {
                padding: 0.8rem 1rem;
                font-size: 0.9rem;
                min-width: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">HI BABY!</h1>
            <p class="subtitle">Please take the time to listen to my voice message.</p>
            
            <div class="main-controls">
                <button class="play-btn" id="playBtn" title="Play/Pause">
                    ▶ Play
                </button>
            </div>
            
            <div class="skip-controls">
                <button class="skip-btn" id="rewindBtn" title="Rewind 10s">
                    ⏪ 10s
                </button>
                <button class="skip-btn" id="forwardBtn" title="Forward 10s">
                    10s ⏩
                </button>
            </div>
            
            <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata">
        <source src="y.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const timeDisplay = document.getElementById('timeDisplay');

        let isPlaying = false;

        // Load metadata
        audio.addEventListener('loadedmetadata', () => {
            updateTimeDisplay();
        });

        // Update time display
        function updateTimeDisplay() {
            const current = formatTime(audio.currentTime);
            const duration = formatTime(audio.duration);
            timeDisplay.textContent = `${current} / ${duration}`;
        }

        // Format time as MM:SS
        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Play/Pause toggle
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play().catch(e => {
                    console.error('Playback failed:', e);
                });
            }
        });

        // Rewind
        rewindBtn.addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        });

        // Forward
        forwardBtn.addEventListener('click', () => {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        });

        // Audio state listeners
        audio.addEventListener('play', () => {
            isPlaying = true;
            playBtn.textContent = '⏸ Pause';
        });

        audio.addEventListener('pause', () => {
            isPlaying = false;
            playBtn.textContent = '▶ Play';
        });

        audio.addEventListener('ended', () => {
            isPlaying = false;
            playBtn.textContent = '▶ Play';
            audio.currentTime = 0;
            updateTimeDisplay();
        });

        // Time update
        audio.addEventListener('timeupdate', () => {
            updateTimeDisplay();
        });

        // Prevent context menu on buttons for cleaner mobile experience
        [playBtn, rewindBtn, forwardBtn].forEach(btn => {
            btn.addEventListener('contextmenu', e => e.preventDefault());
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'Space':
                    e.preventDefault();
                    playBtn.click();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    rewindBtn.click();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    forwardBtn.click();
                    break;
            }
        });
    </script>
</body>
</html>
